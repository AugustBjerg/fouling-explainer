<!-- Favicon: a simple ship on the water. One hull, a small deckhouse, two wave lines.
     Teal accent (glowTeal) on a deep-water card. Colors mirror src/theme.ts tokens. -->
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- deep-water background card -->
  <rect width="64" height="64" rx="14" fill="#0A1A1C"/>

  <!-- ship: hull + deckhouse, drawn in the teal accent -->
  <g fill="#5E8C82">
    <!-- hull -->
    <path d="M12 30 H52 L46 42 C44 44 41 45 37 45 H27 C23 45 20 44 18 42 Z"/>
    <!-- deckhouse -->
    <rect x="27" y="20" width="11" height="10" rx="1.5"/>
  </g>

  <!-- water lines beneath the hull -->
  <g stroke="#5E8C82" stroke-width="2.4" stroke-linecap="round" opacity="0.55">
    <path d="M16 51 C20 48 24 48 28 51 S36 54 40 51 44 48 48 51"/>
  </g>
</svg>
